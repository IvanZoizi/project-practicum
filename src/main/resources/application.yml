spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dbPracticum
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  application:
    name: demo
  kafka:
    bootstrap-servers: kafka:29092
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="devuser" password="devpass";
    consumer:
      group-id: my-group
      auto-offset-reset: earliest

app:
  cred:
    token: "demo token"

server:
  port:
    8080

logging:
  level:
    ru.tbank.practicum.service: DEBUG
    ru.tbank.practicum: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [%mdc] %msg%n"