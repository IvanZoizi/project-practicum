services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    env_file:
      - ./.env
    environment:
      - POSTGRES_DB=dbPracticum
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=dbPracticum
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d dbPracticum" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "postgres"
networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: